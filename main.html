<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제강 한약재 관리 시스템 - 메인</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section id="appPage">
    <header class="app-header">
      <div class="header-inner">
        <div>
          <h1>제강 한약재 관리 시스템</h1>
          <p id="currentUserText">현재 로그인: 제강 · 원장용 전체 기능 화면</p>
        </div>
        <button id="logoutBtn" class="secondary-btn">로그아웃</button>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <button class="menu-btn active" data-tab="dashboard">📦 대시보드</button>
        <button class="menu-btn" data-tab="herbs">📋 약재 목록</button>
        <button class="menu-btn" data-tab="addHerb">➕ 약재 등록</button>
        <button class="menu-btn" data-tab="locations">📍 위치별 보기</button>
        <button class="menu-btn" data-tab="logs">🕘 로그 기록</button>
        <button class="menu-btn" data-tab="staffManage">👥 직원정보관리</button>
        <button class="menu-btn" data-tab="settings">⚙️ 설정</button>
      </aside>

      <main class="content">
        <section id="dashboard" class="tab-section">
          <div class="stat-grid">
            <div class="stat-card"><div class="stat-label">총 약재</div><div id="totalHerbs" class="stat-value">0개</div></div>
            <div class="stat-card"><div class="stat-label">유통기한 임박</div><div id="expirySoon" class="stat-value">0개</div></div>
            <div class="stat-card"><div class="stat-label">재고 부족</div><div id="lowStock" class="stat-value">0개</div></div>
            <div class="stat-card"><div class="stat-label">관리 위치</div><div class="stat-value">4곳</div></div>
          </div>
          <div class="card">
            <div class="toolbar">
              <div>
                <h2>최근 약재 목록</h2>
                <p class="muted">원장용에서는 가격, 거래처, 삭제, 로그 기록까지 모두 보입니다.</p>
              </div>
              <button class="primary-btn" onclick="showTab('addHerb')">약재 등록</button>
            </div>
            <input id="dashboardSearch" class="search-input" placeholder="약재명, 위치, 거래처, 바코드 검색" />
            <div id="dashboardTable"></div>
          </div>
        </section>

        <section id="herbs" class="tab-section hidden">
          <div class="card">
            <div class="toolbar">
              <div>
                <h2>전체 약재 목록</h2>
                <p class="muted">검색 후 상세보기, 수정, 삭제를 할 수 있습니다.</p>
              </div>
              <button class="primary-btn" onclick="showTab('addHerb')">신규 등록</button>
            </div>
            <input id="herbSearch" class="search-input" placeholder="약재명, 위치, 거래처, 바코드 검색" />
            <div id="herbTable"></div>
          </div>
        </section>

        <section id="addHerb" class="tab-section hidden">
          <div class="card">
            <h2>약재 신규 등록</h2>
</html>
