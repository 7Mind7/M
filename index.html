<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제강 한약재 관리 시스템 - 로그인</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section id="loginPage" class="login-page">
    <div class="login-card">
      <div class="title">
        <h1>제강 한약재 관리 시스템</h1>
        <p>사용자 버튼을 누른 뒤 비밀번호를 입력하세요.</p>
      </div>
      <div id="userGrid" class="user-grid"></div>
      <div id="passwordBox" class="password-box hidden">
        <label id="passwordLabel">비밀번호</label>
        <input id="passwordInput" type="password" placeholder="비밀번호 입력" />
        <div style="font-size:12px; color:#64748b; margin-top:8px; line-height:1.5;">
          초기 비밀번호: 제강 0000 / 직원1 1111 / 직원2 2222
        </div>
        <button id="loginBtn" class="primary-btn" style="width:100%; margin-top:14px;">메인으로 접속</button>
      </div>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
